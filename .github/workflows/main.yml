name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build
        run: echo "Building project..."

  report:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Report Build Status
        run: echo "Generating build report..."

  deploy:
    runs-on: ubuntu-latest
    needs: report
    steps:
      - name: Deploy
        run: echo "Deploying..."
